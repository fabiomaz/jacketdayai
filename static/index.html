<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JacketDayAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-4 selection:bg-cyan-500 selection:text-slate-950">

    <div class="w-full max-w-2xl bg-slate-900/40 border border-slate-800/80 backdrop-blur-xl rounded-3xl p-6 md:p-8 shadow-2xl shadow-cyan-950/10">
        <div class="text-center mb-8">
            <span class="text-xs font-bold tracking-widest text-cyan-400 bg-cyan-950/50 px-3 py-1 rounded-full border border-cyan-800/30">L'OUTFIT PERFETTO</span>
            <h1 class="text-3xl md:text-4xl font-extrabold mt-3 tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">JacketDayAI</h1>
            <p class="text-slate-400 text-sm mt-2">Inserisci la città e pianifica i tuoi vestiti senza sorprese meteo.</p>
        </div>

        <form id="searchForm" class="space-y-4 md:space-y-0 md:flex md:gap-3">
            <div class="relative flex-1">
                <input type="text" id="cityInput" placeholder="Es. Milano, Tokyo, Londra..." required
                    class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-4 py-3.5 text-slate-200 placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all">
            </div>

            <div class="w-full md:w-32">
                <select id="daysSelect"
                    class="w-full bg-slate-950 border border-slate-800 rounded-2xl px-3 py-3.5 text-slate-200 focus:outline-none focus:border-cyan-500 transition-all">
                    <option value="1">1 Giorno</option>
                    <option value="2">2 Giorni</option>
                    <option value="3">3 Giorni</option>
                    <option value="4">4 Giorni</option>
                    <option value="5">5 Giorni</option>
                </select>
            </div>

            <button type="submit"
                class="w-full md:w-auto bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-950 font-bold px-6 py-3.5 rounded-2xl transition-all active:scale-[0.98] shadow-lg shadow-cyan-500/20">
                Cerca
            </button>
        </form>

        <div id="loading" class="hidden text-center py-12">
            <div class="animate-spin inline-block w-8 h-8 border-[3px] border-current border-t-transparent text-cyan-500 rounded-full" role="status"></div>
            <p class="text-sm text-slate-400 mt-2">Interrogando i satelliti...</p>
        </div>

        <div id="errorMessage" class="hidden mt-6 bg-red-950/30 border border-red-800/50 text-red-400 p-4 rounded-2xl text-sm text-center"></div>

        <div id="results" class="hidden mt-8 space-y-6">
            <h2 class="text-xl font-bold text-slate-200">Previsioni per <span id="resultCity" class="text-cyan-400"></span></h2>
            <div id="forecastGrid" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
